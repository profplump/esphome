substitutions:
  enable_ipv6: true
  wifi_power_save: LIGHT
  wifi_ssid: !secret wifi_ssid
  wifi_key: !secret wifi_password
  wifi_signal_interval: 1h

network:
    enable_ipv6: ${enable_ipv6}

wifi:
  power_save_mode: ${wifi_power_save}
  ssid: ${wifi_ssid}
  password: ${wifi_key}

sensor:
  # WiFi strength in dB
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    icon: mdi:wifi-strength-2
    entity_category: diagnostic
    update_interval: ${wifi_signal_interval}
    disabled_by_default: True
  # WiFi stength in percent
  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal %"
    icon: mdi:wifi-strength-2
    filters:
      - lambda: return min(max(2.06 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: diagnostic
    device_class: ""
    disabled_by_default: True

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP
      icon: mdi:ip-network
      entity_category: diagnostic
      disabled_by_default: True
      address_0:
        name: IP 0
        icon: mdi:ip-network
        disabled_by_default: True
      address_1:
        name: IP 1
        icon: mdi:ip-network
        disabled_by_default: True
      address_2:
        name: IP 2
        icon: mdi:ip-network
        disabled_by_default: True
      address_3:
        name: IP 3
        icon: mdi:ip-network
        disabled_by_default: True
      address_4:
        name: IP 4
        icon: mdi:ip-network
        disabled_by_default: True
    mac_address:
      name: MAC
      icon: mdi:lan
      entity_category: diagnostic
      disabled_by_default: True
    power_save_mode:
      name: WiFi Power Save Mode
      icon: mdi:wifi-star
      entity_category: diagnostic
      disabled_by_default: True
    ssid:
      name: SSID
      icon: mdi:wifi
      entity_category: diagnostic
      disabled_by_default: True
    bssid:
      name: BSSID
      icon: mdi:wan
      entity_category: diagnostic
      disabled_by_default: True
    scan_results:
      name: WiFi Scan
      icon: mdi:access-point-network
      entity_category: diagnostic
      disabled_by_default: True
