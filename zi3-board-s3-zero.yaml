# Datasheet: https://www.waveshare.com/wiki/ESP32-S3-Zero

substitutions:
  zero_board: esp32-s3-devkitc-1
  builtin_rgb_name: "Builtin RGB"
  builtin_rgb_icon: mdi:head-lightbulb-outline
  builtin_rgb_rmt: 48
  builtin_rgb_disabled: False

  # Older revisions have quad-4MB PSRAM
  zero_flash_size: 4MB
  zero_flash_width: quad
  # Revisions with N8R8 stickers have octal-8MB PSRAM
  #zero_flash_size: 8MB
  #zero_flash_width: octal

packages:
  esp32: !include zi3-board-esp32.yaml
  wifi: !include zi3-wifi.yaml

esp32:
  board: ${zero_board}
  flash_size: ${zero_flash_size}

psram:
  # quad not octal, despite the website text
  mode: ${zero_flash_width}
  speed: 80MHz
  ignore_not_found: false

light:
  - platform: esp32_rmt_led_strip
    id: builtin_rgb
    name: ${builtin_rgb_name}
    icon: ${builtin_rgb_icon}
    disabled_by_default: ${builtin_rgb_disabled}
    pin:
      number: GPIO21
    chipset: WS2812
    rgb_order: RGB
    num_leds: 1
    rmt_symbols: ${builtin_rgb_rmt}
    effects:
      - random:
          transition_length: 5s
          update_interval: 7s
      - pulse:
      - strobe:
      - flicker:
