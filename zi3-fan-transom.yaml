# Inject IR-encoded TTL signals to the fan
remote_transmitter:
  pin:
    number: GPIO04
    inverted: True
    mode:
      output: True
      # Open-drain so the physical IR reciever still works
      open_drain: True
  carrier_duty_percent: 50%
  non_blocking: True
  rmt_symbols: 48

# Read IR to capture codes as seen at the fan
# Bridge to the IR TX pin for bi-directional IR
remote_receiver:
  pin:
    number: GPIO05
    inverted: True
    mode:
      input: True
      pullup: False
  rmt_symbols: 48
  dump: pronto

# Fan main board sends TTL serial to the motor control board
# Read it so we know the command state of all the motors (and thermostat)
uart:
  id: uart_motor
  baud_rate: 4800
  rx_pin:
    number: GPIO06
    inverted: False
  debug:
    direction: BOTH
    dummy_receiver: True
    debug_prefix: "UART_Motor "
    after:
      timeout: 10ms
      # Different revisions of this fan use different UART message formats
      # They are all delimited with the sequence 0x98 0x98 0x1E 0x1E
      delimiter:
        - 152
        - 152
        - 30
        - 30
    sequence:
      - lambda: |-
          bool err = true;

          // 13-byte message
          if (
            bytes.size() == 13 &&
            bytes[0] == 0x00 && bytes[3] == 0x18 &&
            bytes[5] == 0x18 && bytes[6] == 0x18 &&
            bytes[7] == 0x1E && bytes[8] == 0x18 &&
            bytes[9] == 0x98 && bytes[10] == 0x98 &&
            bytes[11] == 0x1E && bytes[12] == 0x1E
          ) {
            // Valid parse
            err = false;

            // Power and reverse from byte 1
            id(power_sense).publish_state(!(bytes[1] == 0x98 || bytes[1] == 0x18));
            if (id(power_sense).state) {
              id(reverse_sense).publish_state(bytes[1] == 0x9E);
            } else {
              id(reverse_sense).publish_state(id(fan_cmd).direction == FanDirection::REVERSE);
            }

            // Thermostat from byte 2
            UARTDebug::log_hex(direction, bytes, ' ', debug_prefix);
            id(thermostat_sense).publish_state(bytes[2] == 0x18);

            // Speed from byte 4
            int speed = 0;
            switch (bytes[4]) {
              case 0x18:
                speed = 1;
                break;
              case 0x98:
                speed = 2;
                break;
              case 0x1E:
                speed = 3;
                break;
              case 0x9E:
                speed = 4;
                break;
            }
            if (id(speed_sense).state != speed) {
              id(speed_sense).publish_state(speed);
            }

          // 17-byte message
          } else if (
            bytes.size() == 17 &&
            bytes[0] == 0x98 && bytes[1] == 0xF8 &&
            bytes[4] == 0x98 && bytes[6] == 0x9E &&
            bytes[7] == 0x18 && bytes[8] == 0x18 &&
            bytes[9] == 0x9E && bytes[10] == 0x98 &&
            bytes[11] == 0x18 && bytes[12] == 0x9E &&
            bytes[13] == 0x98 && bytes[14] == 0x98 &&
            bytes[15] == 0x1E && bytes[16] == 0x1E    
          ) {
            // Valid parse
            err = false;

            // Power and reverse from byte 2
            id(power_sense).publish_state(!(bytes[2] == 0x98 || bytes[2] == 0x18));
            if (id(power_sense).state) {
              id(reverse_sense).publish_state(bytes[2] == 0x1E);
            } else {
              id(reverse_sense).publish_state(id(fan_cmd).direction == FanDirection::REVERSE);
            }

            // Thermostat from byte 3
            id(thermostat_sense).publish_state(bytes[3] == 0x1E);

            // Speed from byte 5
            int speed = 0;
            switch (bytes[5]) {
              case 0x18:
                speed = 1;
                break;
              case 0x98:
                speed = 2;
                break;
              case 0x1E:
                speed = 3;
                break;
              case 0x9E:
                speed = 4;
                break;
            }
            if (id(speed_sense).state != speed) {
              id(speed_sense).publish_state(speed);
            }
          }

          // Skip and log invalid reads
          if (err) {
            UARTDebug::log_hex(direction, bytes, ' ', debug_prefix);
            return;
          }

          // Check for (and eventually resolve) fan_cmd sync
          if (
            id(fan_cmd).state == id(power_sense).state &&
            id(fan_cmd).speed == id(speed_sense).state &&
            (id(fan_cmd).direction == FanDirection::REVERSE) == id(reverse_sense).state
          ) {
            id(last_sync) = millis();
          }
          int age = (millis() - id(last_sync)) / 1000;
          if (age != id(sync_age).state) {
            id(sync_age).publish_state(age);
            if (age > ${sync_timeout}) {
              if (!id(sync_to_sense).is_running()) {
                id(sync_to_sense).execute();
              }
            }
          }

# 17 bytes @ 4800 baud
# 98 F8 1E 18 98 18 9E 18 18 9E 98 18 9E 98 98 1E 1E
# Power: On, Direction: Exhaust, Thermostat: Off, Speed: 1
# Byte 0-1 :
# 	Always:   98 F8
# Byte 2 Power/Reverse:
# 	Off:      98/18
# 	Intake:   9E
# 	Exhaust:  1E
# Byte 3: Thermostat
# 	Armed:		1E
# 	Off:	    18
# Byte 4:
# 	Always:   98
# Byte 5 Speed:
# 	1:        18
# 	2:        98
# 	3:        1E
# 	4:        9E
# Bytes 6-16:
#   Always:   9E 18 18 9E 98 18 9E 98 98 1E 1E

# 13 bytes @ 4800 baud
# 00 9E 1E 18 98 18 18 1E 18 98 98 1E 1E
# Power: On, Direction: Intake, Thermostat: Armed, Speed: 2
# Byte 0 :
# 	Always:   00
# Byte 1 Power/Reverse:
# 	Off:      98/18
# 	Intake:   1E
# 	Exhaust:  9E
# Byte 2: Thermostat
# 	Armed:		18
# 	Off:	    1E
# Byte 3:
# 	Always:   18
# Byte 4 Speed:
# 	1:        18
# 	2:        98
# 	3:        1E
# 	4:        9E
# Bytes 5-12:
#   Always:   18 18 1E 18 98 98 1E 1E