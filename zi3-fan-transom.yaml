        data: '0000 006D 0030 0000 0031 0011 0030 0011 0010 0031 0030 0011 0030 0011 0010 0031 0010 0031 0010 0031 0010 0031 0010 0031 0010 0031 0030 0113 0030 0011 0030 0011 0010 0031 0030 0011 0030 0011 0010 0031 0010 0031 0010 0031 0010 0031 0010 0031 0010 0031 0030 0113 0030 0011 0030 0011 0010 0031 0030 0011 0030 0011 0010 0031 0010 0031 0010 0031 0010 0031 0010 0031 0010 0031 0030 0113 0030 0011 0030 0011 0010 0031 0030 0011 0030 0011 0010 0031 0010 0031 0010 0031 0010 0031 0010 0031 0010 0031 0030 0181'
