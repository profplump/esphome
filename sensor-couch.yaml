# I2C buses
i2c:
  - id: i2c_bme280
    sda: GPIO18
    scl: GPIO21
  # - id: i2c_ens160
  #   sda: GPIO11
  #   scl: GPIO12

# Sensor power via GPIO; the BME280 draws <1mA peak, ENS160 <20mA
# This push-pull setup allows any 4 pins to service each sensor
output:
  # - platform: gpio
  #   id: power_ens160_vcc
  #   pin: GPIO14
  # - platform: gpio
  #   id: power_ens160_gnd
  #   pin: GPIO13
  # - platform: template
    # type: binary
    # id: power_ens160
    # write_action: 
    #   then:
    #     - lambda: |-
    #         id(power_ens160_gnd).turn_off();
    #         if (state) {
    #           id(power_ens160_vcc).turn_on();
    #         } else {
    #           id(power_ens160_vcc).turn_off();
    #         }

  - platform: gpio
    id: power_bme280_vcc
    pin: GPIO47
  - platform: gpio
    id: power_bme280_gnd
    pin: GPIO38
  - platform: template
    type: binary
    id: power_bme280
    write_action: 
      then:
        - lambda: |-
            id(power_bme280_gnd).turn_off();
            if (state) {
              id(power_bme280_vcc).turn_on();
            } else {
              id(power_bme280_vcc).turn_off();
            }


