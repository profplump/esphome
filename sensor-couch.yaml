packages:
  nvm: !include zi3-nvm.yaml
  base: !include zi3-base.yaml
  board: !include zi3-board-s3-nano.yaml

sensor:
  - platform: bme280_i2c
    id: air_temp_press_humid
    i2c_id: i2c_bme280
    address: 0x76
    temperature:
      id: temperature
      name: ${temperature_name}
      icon: ${temperature_icon}
      device_class: "temperature"
      state_class: "measurement"
      unit_of_measurement: "°C"
      accuracy_decimals: 1
    pressure:
      id: pressure
      name: ${pressure_name}
      icon: ${pressure_icon}
      device_class: "pressure"
      state_class: "measurement"
      unit_of_measurement: "Pa"
      accuracy_decimals: 0
    humidity:
      id: humidity
      name: ${humidity_name}
      icon: ${humidity_icon}
      device_class: "humidity"
      state_class: "measurement"
      unit_of_measurement: "%"
      accuracy_decimals: 0

