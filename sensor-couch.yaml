    #     - output.turn_off: power_ens160
  - platform: template
    id: temp_sensor_power_swtich
    name: ${temp_sensor_power_name}
    icon: ${temp_sensor_power_icon}
    disabled_by_default: True
    optimistic: True
    restore_mode: ${temp_sensor_power_default}
    turn_on_action:
      then:
        - output.turn_on: power_bme280
    turn_off_action:
      then:
        - output.turn_off: power_bme280

